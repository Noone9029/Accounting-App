services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: accounting
      POSTGRES_USER: accounting
      POSTGRES_PASSWORD: accounting
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accounting -d accounting"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm install && pnpm --filter @ledgerbyte/api db:generate && pnpm --filter @ledgerbyte/api dev"
    environment:
      DATABASE_URL: postgresql://accounting:accounting@postgres:5432/accounting?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-development-secret-change-me
      JWT_EXPIRES_IN: 7d
      API_PORT: 4000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "4000:4000"
    volumes:
      - ..:/workspace
      - pnpm-store:/root/.local/share/pnpm/store
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: node:22-alpine
    working_dir: /workspace
    command: sh -lc "corepack enable && pnpm install && pnpm --filter @ledgerbyte/web dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    ports:
      - "3000:3000"
    volumes:
      - ..:/workspace
      - pnpm-store:/root/.local/share/pnpm/store
    depends_on:
      - api

volumes:
  postgres-data:
  pnpm-store:
